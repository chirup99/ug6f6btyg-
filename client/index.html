<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preload" as="image" href="/bruce-lee-card.webp" type="image/webp" />
    <link rel="preload" as="image" href="/bruce-lee-enemy-within.webp" type="image/webp" />
    <title>Perala</title>
    <style>
      #root-loading {
        position: fixed;
        inset: 0;
        background: #0f1117;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #root-loading .logo-ring {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 2px solid #1e2130;
        border-top-color: #6366f1;
        animation: spin 0.9s linear infinite;
        margin-bottom: 18px;
      }
      #root-loading .label {
        font-size: 13px;
        font-weight: 500;
        color: #4b5563;
        letter-spacing: 0.04em;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root-loading">
      <div class="logo-ring"></div>
      <span class="label">Perala</span>
    </div>
    <div id="root"></div>

    <script>
      // ── Spinner removal — runs IMMEDIATELY, no DOMContentLoaded wait ──────────
      // BUG FIX: Previously used DOMContentLoaded which fires AFTER sync/defer
      // scripts, creating a race where React could mount before the observer even
      // started, leaving the spinner stuck forever on EB/production.
      (function () {
        function removeLoader() {
          var loader = document.getElementById('root-loading');
          if (!loader || loader._removing) return;
          loader._removing = true;
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.25s ease';
          setTimeout(function () {
            if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
          }, 280);
        }

        var root = document.getElementById('root');

        // Already mounted (fast path — shouldn't happen yet, but guard anyway)
        if (root && root.children.length > 0) {
          removeLoader();
          return;
        }

        // Watch for React mounting #root children
        var obs = new MutationObserver(function () {
          if (root && root.children.length > 0) {
            removeLoader();
            obs.disconnect();
          }
        });
        if (root) obs.observe(root, { childList: true, subtree: false });

        // Hard timeout: remove spinner after 6 s regardless (prevents stuck screen)
        setTimeout(removeLoader, 6000);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>

    <!--
      Replit dev banner — async so it NEVER blocks parsing or DOMContentLoaded.
      This was the main cause of the stuck spinner on AWS: the blocking script
      delayed DOMContentLoaded past React's mount, so the old observer never fired.
    -->
    <script async src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
